    <script>
        // 讓 HTTP/HTTPS、XAMPP/GitHub 高度行為一致
        function setVh() {
            document.documentElement.style.setProperty('--vh', window.innerHeight + 'px');

        setVh();

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ══════════════════════════════════════
           響應式變數：完美復刻 LINE 聊天室比例
           ══════════════════════════════════════ */
        :root {
            --safe-top:    env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left:   env(safe-area-inset-left, 0px);
            --safe-right:  env(safe-area-inset-right, 0px);

            /* 【手機預設 (< 600px) - 完美復刻 LINE 比例】 */
            --body-max:  100%;
            --av:        40px;          /* LINE 標準頭像大小 */
            --bf:        16px;          /* LINE 預設對話文字大小 (偏大且清晰) */
            --bp:        9px 12px;      /* LINE 氣泡內邊距 */
            --nf:        12px;          /* 名稱字體大小 */
            --tf:        11px;          /* 時間字體大小 */
            --cp:        14px 14px;     /* 聊天室兩側留白 */
            --mg:        8px;           /* 頭像與氣泡的間距 */
            --mb:        14px;          /* 訊息與訊息之間的間距 */
            --hp:        10px 14px 8px;
            --ls:        36px;   
            --hf:        15px;   
            --fp:        8px 14px 10px;
            --cw:        75%;           /* LINE 氣泡最大寬度比例 */
            --modal-max: 100%;
        }

        /* 平板 (≥ 600px) */
        @media (min-width: 600px) {
            :root {
                --body-max:  640px;
                --av:        44px;
                --bf:        16px;
                --bp:        11px 15px;
                --nf:        12px;
                --tf:        11px;
                --cp:        14px 18px 14px;
                --mg:        10px;
                --mb:        18px;
                --hp:        12px 20px 10px;
                --ls:        40px;
                --hf:        15px;
                --fp:        10px 20px 12px;
                --cw:        75%;
                --modal-max: 560px;
            }
        }

        /* 電腦 (≥ 1024px) */
        @media (min-width: 1024px) {
            :root {
                --body-max:  900px;
                --av:        50px;
                --bf:        17px;
                --bp:        12px 17px;
                --nf:        13px;
                --tf:        12px;
                --cp:        18px 28px 18px;
                --mg:        12px;
                --mb:        22px;
                --hp:        14px 28px 12px;
                --ls:        44px;
                --hf:        16px;
                --fp:        12px 28px 14px;
                --cw:        68%;
                --modal-max: 600px;
            }
        }

        /* ══ 基礎重置 ══ */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            background: #4a6aa0; 
        }

        body {
            height: var(--vh, 100vh);
            overflow: hidden;
            overscroll-behavior: none;
            width: 100%;
            max-width: var(--body-max);
            margin: 0 auto;
            background-color: #6b8ec7;
            background-image:
                radial-gradient(ellipse at 20% 0%, #7fa3d8 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, #5570a8 0%, transparent 60%);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                         "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        /* ══ Header ══ */
        .app-header {
            padding: var(--hp);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(255,255,255,0.15);
        }

        .logo-block {
            width: var(--ls);
            height: var(--ls);
            background: rgba(255,255,255,0.18);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 0.5px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        .logo-text {
            color: #fff;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: -0.5px;
        }

        .header-info { margin-left: 10px; }
        .header-title {
            color: #fff;
            font-weight: 800;
            font-size: var(--hf);
            letter-spacing: -0.3px;
            line-height: 1.2;
        }
        .header-sub {
            color: rgba(255,255,255,0.65);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
            line-height: 1.3;
        }
        .header-sub span { color: #fff; }

        .status-badge {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
        }
        .status-label {
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .status-live {
            color: #6ee7b7;
            font-size: 9px;
            font-weight: 800;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .status-live { animation: blink 1.8s ease-in-out infinite; }

        /* ══ 聊天區 ══ */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            padding: var(--cp);
            scroll-behavior: smooth;
        }
        #chat-box::-webkit-scrollbar { display: none; }

        /* ══ 訊息群組 ══ */
        .msg-group {
            display: flex;
            gap: var(--mg);
            margin-bottom: var(--mb);
        }
        .msg-group.user  { justify-content: flex-end; }
        .msg-group.agent { justify-content: flex-start; }

        .agent-avatar {
            width: var(--av) !important;
            height: var(--av) !important;
            min-width: var(--av) !important;
            border-radius: 50% !important;
            object-fit: cover !important;
            border: 1px solid rgba(255,255,255,0.15); /* 微調邊框厚度 */
            margin-top: 2px;
            flex-shrink: 0;
        }

        .msg-content-wrap {
            display: flex;
            flex-direction: column;
            max-width: var(--cw);
        }
        .msg-group.user  .msg-content-wrap { align-items: flex-end; }
        .msg-group.agent .msg-content-wrap { align-items: flex-start; }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 4px;
            padding: 0 2px;
        }
        .msg-name {
            font-size: var(--nf);
            font-weight: 700;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .msg-dot {
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }
        .msg-time {
            font-size: var(--tf);
            color: rgba(255,255,255,0.35);
            font-weight: 600;
        }

        /* ══ 氣泡（完美還原 LINE 圓角結構與行高） ══ */
        .bubble {
            padding: var(--bp);
            line-height: 1.6; /* 調整為 LINE 般的舒適行高 */
            font-size: var(--bf);
            font-weight: 400;
            word-break: break-word;
        }
        .bubble-user {
            background: #fff;
            color: #1a2b4b;
            border-radius: 16px; /* 使用更柔和的 LINE 風格圓角 */
        }
        .bubble-agent {
            background: rgba(0,0,0,0.22);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            border: 0.5px solid rgba(255,255,255,0.12);
            border-radius: 16px; /* 使用更柔和的 LINE 風格圓角 */
        }

        /* ══ PDF 附件 ══ */
        .pdf-attach {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 0.5px solid rgba(255,255,255,0.12);
        }
        .pdf-link {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 10px 12px;
            text-decoration: none;
            transition: background 0.2s;
            -webkit-tap-highlight-color: rgba(255,255,255,0.1);
        }
        .pdf-link:active { background: rgba(255,255,255,0.14); }
        .pdf-icon {
            width: 36px;
            height: 36px;
            background: rgba(239,68,68,0.75);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 900;
            font-size: 9px;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }
        .pdf-info-title {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
        }
        .pdf-info-sub {
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ══ Footer ══ */
        .app-footer {
            padding: var(--fp);
            flex-shrink: 0;
        }
        .footer-pill {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255,255,255,0.18);
            border-radius: 100px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        @keyframes ping {
            0%      { transform: scale(1); opacity: 1; }
            75%,100%{ transform: scale(2); opacity: 0; }
        }
        .ping-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #60a5fa;
            position: relative;
            flex-shrink: 0;
        }
        .ping-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #60a5fa;
            animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite;
        }
        .footer-text {
            color: rgba(255,255,255,0.6);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* ══ 淡入動畫 ══ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.25s ease-out; }

        /* ══ Agent Profile Modal ══ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(10,18,40,0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes slideDown {
            from { transform: translateY(0);    opacity: 1; }
            to   { transform: translateY(100%); opacity: 0; }
        }

        .modal-sheet {
            width: 100%;
            max-width: var(--modal-max);
            background: linear-gradient(160deg, #1a2e5a 0%, #0f1e3d 100%);
            border-radius: 24px 24px 0 0;
            border-top: 0.5px solid rgba(255,255,255,0.15);
            padding-bottom: var(--safe-bottom);
            animation: slideUp 0.32s cubic-bezier(0.32,0.72,0,1);
            overflow: hidden;
        }
        .modal-sheet.closing {
            animation: slideDown 0.25s cubic-bezier(0.32,0.72,0,1) forwards;
        }

        .modal-handle {
            width: 36px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 12px auto 0;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px 14px;
            border-bottom: 0.5px solid rgba(255,255,255,0.08);
        }

        .modal-avatar-lg {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.25);
            flex-shrink: 0;
        }

        .modal-name {
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }
        .modal-sign {
            color: rgba(255,255,255,0.45);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .modal-body {
            padding: 16px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 55vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .modal-body::-webkit-scrollbar { display: none; }

        .modal-section-label {
            font-size: 9px;
            font-weight: 800;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .trait-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .trait-chip {
            background: rgba(255,255,255,0.1);
            border: 0.5px solid rgba(255,255,255,0.15);
            border-radius: 100px;
            padding: 5px 11px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.75);
        }

        .expertise-card {
            background: rgba(255,255,255,0.06);
            border: 0.5px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 12px 14px;
        }
        .expertise-title {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            margin-bottom: 4px;
        }
        .expertise-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.55;
        }

        .modal-close-btn {
            margin: 0 20px 16px;
            padding: 13px;
            background: rgba(255,255,255,0.08);
            border: 0.5px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
        }
        .modal-close-btn:active { background: rgba(255,255,255,0.14); }

        .agent-avatar { cursor: pointer; }
        .agent-avatar:active { opacity: 0.75; transform: scale(0.92); transition: transform 0.1s; }
    </style>
</head>

        function openModal(senderName, avatarSrc) {
            const profile = AGENT_PROFILES[senderName];
            if (!profile) return;

            document.getElementById('modal-avatar').src = avatarSrc;
            document.getElementById('modal-avatar').alt = senderName;
            document.getElementById('modal-name').textContent = senderName;
            document.getElementById('modal-sign').textContent = profile.sign;
            document.getElementById('modal-role').textContent = profile.role;
            document.getElementById('modal-expertise').textContent = profile.expertise;

            const traitsEl = document.getElementById('modal-traits');
            traitsEl.innerHTML = profile.traits.map(t => `<span class="trait-chip">${t}</span>`).join('');

            const sheet = document.getElementById('modal-sheet');
            sheet.classList.remove('closing');

            const overlay = document.getElementById('agent-modal');
            overlay.classList.add('active');
        }

        function closeModal() {
            const sheet = document.getElementById('modal-sheet');
            sheet.classList.add('closing');
            setTimeout(() => {
                document.getElementById('agent-modal').classList.remove('active');
            }, 240);
        }

        document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        document.getElementById('agent-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        async function syncCurrentManager() {
            const { data } = await supabaseInstance
                .from('messages')
                .select('sender_name, content')
                .eq('is_manager', true)
                .order('created_at', { ascending: false })
                .limit(1);
            if (data && data.length > 0) updateManagerName(data[0]);
            else document.getElementById('manager-name').innerText = "系統就緒";
        }

        function updateManagerName(msg) {
            let name = msg.sender_name;
            if (name === "System" && msg.content.includes('主持人已更換為')) {
                const matched = msg.content.match(/「(.+?)」/);
                if (matched) name = matched[1];
            }
            document.getElementById('manager-name').innerText = name;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function renderMessage(msg) {
            const chatBox = document.getElementById('chat-box');
            if (msg.is_manager === true) updateManagerName(msg);

            const isUser = msg.sender_name && msg.sender_name.toLowerCase().includes('user');
            const avatarSrc = isUser
                ? AVATAR_MAP["User"]
                : (AVATAR_MAP[msg.sender_name] || msg.avatar_url || `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(msg.sender_name)}`);

            const time = new Date(msg.created_at).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            const safeContent = escapeHtml(msg.content).replace(/\n/g, '<br>');
            const safeName = escapeHtml(msg.sender_name || '');
            const hasProfile = !isUser && AGENT_PROFILES[msg.sender_name];
            const avatarClick = hasProfile
                ? `onclick="openModal('${msg.sender_name.replace(/'/g, "\\'")}', '${avatarSrc}')" title="${msg.sender_name} 檔案"`
                : '';

            const pdfHtml = msg.file_url ? `
                <div class="pdf-attach">
                    <a href="${escapeHtml(msg.file_url)}" target="_blank" class="pdf-link">
                        <div class="pdf-icon">PDF</div>
                        <div>
                            <div class="pdf-info-title">軍事研討·戰術報告</div>
                            <div class="pdf-info-sub">Strategy Report</div>
                        </div>
                    </a>
                </div>` : '';

            const html = isUser ? `
                <div class="msg-group user animate-in">
                    <div class="msg-content-wrap">
                        <div class="msg-meta">
                            <span class="msg-name">${safeName}</span>
                            <span class="msg-dot"></span>
                            <span class="msg-time">${time}</span>
                        </div>
                        <div class="bubble bubble-user">${safeContent}${pdfHtml}</div>
                    </div>
                    <img src="${avatarSrc}" class="agent-avatar" alt="user" loading="lazy">
                </div>` : `
                <div class="msg-group agent animate-in">
                    <img src="${avatarSrc}" class="agent-avatar" ${avatarClick} alt="${safeName}" loading="lazy">
                    <div class="msg-content-wrap">
                        <div class="msg-meta">
                            <span class="msg-name">${safeName}</span>
                            <span class="msg-dot"></span>
                            <span class="msg-time">${time}</span>
                        </div>
                        <div class="bubble bubble-agent">${safeContent}${pdfHtml}</div>
                    </div>
                </div>`;

            chatBox.insertAdjacentHTML('beforeend', html);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function fetchHistory() {
            const { data } = await supabaseInstance
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(500);
            if (data) data.reverse().forEach(msg => renderMessage(msg));
        }

        function subscribeToMessages() {
            supabaseInstance
                .channel('public:messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    renderMessage(payload.new);
                })
                .subscribe();
        }

        window.addEventListener('load', () => {
            fetchHistory();
            syncCurrentManager();
            subscribeToMessages();
        });
    </script>
